name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

  # ── Token Build ───────────────────────────────────────────────────────────
  tokens:
    name: Build & Validate Tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens
        run: pnpm build:tokens

      - name: Validate token output
        run: pnpm tokens:validate

      - name: Upload token artifacts
        uses: actions/upload-artifact@v4
        with:
          name: token-dist
          path: packages/tokens/dist/
          retention-days: 7

  # ── Storybook Build ───────────────────────────────────────────────────────
  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: [tokens]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download token artifacts
        uses: actions/download-artifact@v4
        with:
          name: token-dist
          path: packages/tokens/dist/

      - name: Build Storybook
        run: pnpm storybook build

      - name: Upload Storybook
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: apps/storybook/storybook-static/
          retention-days: 7

  # ── Token Diff (PRs only) ─────────────────────────────────────────────────
  token-diff:
    name: Token Diff Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [tokens]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate token diff
        run: pnpm tokens:diff

      - name: Comment PR with token diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diffPath = 'packages/tokens/token-diff.md';
            if (fs.existsSync(diffPath)) {
              const diff = fs.readFileSync(diffPath, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Token Diff\n\n${diff}`,
              });
            }
