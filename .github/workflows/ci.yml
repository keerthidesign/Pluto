name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Format check
        run: pnpm format:check

  # ── Token Build ───────────────────────────────────────────────────────────
  tokens:
    name: Build & Validate Tokens
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens
        run: pnpm build:tokens

      - name: Validate token output
        run: pnpm tokens:validate

      - name: Upload token artifacts
        uses: actions/upload-artifact@v4
        with:
          name: token-dist
          path: packages/tokens/dist/
          retention-days: 7

  # ── Storybook Build ───────────────────────────────────────────────────────
  storybook:
    name: Build Storybook
    runs-on: ubuntu-latest
    needs: [tokens]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download token artifacts
        uses: actions/download-artifact@v4
        with:
          name: token-dist
          path: packages/tokens/dist/

      - name: Build Storybook
        run: pnpm storybook:build

      - name: Upload Storybook
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: apps/storybook/storybook-static/
          retention-days: 7

  # ── Deploy Storybook → GitHub Pages (main branch only) ───────────────────
  deploy-storybook:
    name: Deploy Storybook to GitHub Pages
    runs-on: ubuntu-latest
    needs: [storybook]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Storybook artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Token Diff (PRs only) ─────────────────────────────────────────────────
  token-diff:
    name: Token Diff Report
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [tokens]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate token diff
        run: pnpm tokens:diff

      - name: Comment PR with token diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const diffPath = 'packages/tokens/token-diff.md';
            if (fs.existsSync(diffPath)) {
              const diff = fs.readFileSync(diffPath, 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Token Diff\n\n${diff}`,
              });
            }
